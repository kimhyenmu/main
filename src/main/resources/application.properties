spring.application.name=Assignment

# Server Configuration
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:monitoring
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (개발용)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Monitoring Agent Configuration
# 점검 주기 (밀리초) - 30초마다 점검
monitoring.agent.check-interval=30000
# 대상 URL - 점검할 웹사이트
monitoring.agent.target-url=https://www.google.com
# 백엔드 서버 주소
monitoring.agent.server-url=http://localhost:8080
# API 키
monitoring.agent.api-key=test-api-key-12345
# Agent 활성화 여부
monitoring.agent.enabled=true
# 재시도 최대 횟수
monitoring.agent.max-retries=3

# Alert Configuration
# 상태 코드 임계값 (이 값 이상이면 알림)
monitoring.alert.status-code-threshold=400
# 응답 시간 임계값 (밀리초, 이 값 이상이면 알림)
monitoring.alert.response-time-threshold=5000

# Notification - Webhook
monitoring.notification.webhook.enabled=true
monitoring.notification.webhook.url=http://localhost:8080/_test/inbox

# Notification - Email (선택사항)
monitoring.notification.email.enabled=false
monitoring.notification.email.from=noreply@monitoring.local
monitoring.notification.email.to=

# Mail Server Configuration (이메일 알림 사용 시)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# API Key for /events endpoint
monitoring.api.key=test-api-key-12345

# Logging
logging.level.com.example.assignment=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
